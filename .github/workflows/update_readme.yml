name: Actualizar actividad del perfil

on:
  schedule:
    - cron: "0 * * * *"            # cada hora
  workflow_dispatch:               # ejecución manual
  push:
    branches:
      - main

# Dar permisos de escritura al token para poder commitear cambios al README
permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Actualizar sección de actividad
        uses: jamesgeorge007/github-activity-readme@v0.3.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # <-- clave
        with:
          COMMIT_MSG: "chore: actualizar actividad reciente"
          MAX_LINES: 10
          GH_USERNAME: oneshot0                       # o tu usuario exacto
